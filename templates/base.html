<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}投資DB{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">📈 投資DB</span>
  <a class="tab {% if request.path=='/' %}active{% endif %}" href="/">ダッシュボード</a>
  <a class="tab {% if request.path=='/stocks' %}active{% endif %}" href="/stocks">銘柄一覧</a>
  <a class="tab {% if request.path=='/gainers' %}active{% endif %}" href="/gainers">上昇率</a>
  <a class="tab {% if request.path=='/rankings' %}active{% endif %}" href="/rankings">ランキング</a>
  <a class="tab {% if request.path=='/short' %}active{% endif %}" href="/short">空売り</a>
  <a class="tab {% if request.path=='/watchlist' %}active{% endif %}" href="/watchlist">ウォッチ</a>
  <span class="spacer"></span>
  <form class="search" onsubmit="return goStock(event)">
    <input type="text" id="search-code" placeholder="銘柄コード" inputmode="numeric">
    <button class="btn btn-sm btn-ghost" type="submit">検索</button>
  </form>
</nav>

<div class="container">
{% block content %}{% endblock %}
</div>

<script>
function goStock(e){
  e.preventDefault();
  const c = document.getElementById('search-code').value.trim();
  if(c) location.href = '/stock/' + c;
  return false;
}
function fmtNum(n){ return n==null ? '-' : Number(n).toLocaleString(); }
function fmtPct(n){ return n==null ? '-' : (n>=0?'+':'') + Number(n).toFixed(2) + '%'; }
function pctClass(n){ return n==null ? '' : (n>0?'rise':(n<0?'fall':'')); }

// ===== どのページの表からでもウォッチ追加（コード列に☆を自動付与） =====
let WATCHED = new Set();
async function toggleWatch(code, el){
  try{
    const r = await (await fetch('/api/watch/'+code,{method:'POST'})).json();
    if(r.watched) WATCHED.add(code); else WATCHED.delete(code);
    document.querySelectorAll('.watch-btn[data-code="'+code+'"]').forEach(b=>{
      b.textContent = r.watched ? '★' : '☆'; b.classList.toggle('on', r.watched);
    });
  }catch(e){}
}
function injectStars(){
  document.querySelectorAll('td.code a[href^="/stock/"]').forEach(a=>{
    if(a.dataset.starred) return;
    const m = a.getAttribute('href').match(/\/stock\/([^?#\/]+)/);
    if(!m) return;
    a.dataset.starred = '1';
    const code = m[1];
    const btn = document.createElement('button');
    btn.className = 'watch-btn'; btn.dataset.code = code;
    btn.textContent = WATCHED.has(code) ? '★' : '☆';
    if(WATCHED.has(code)) btn.classList.add('on');
    btn.title = 'ウォッチ追加/解除';
    btn.onclick = (e)=>{ e.preventDefault(); e.stopPropagation(); toggleWatch(code, btn); };
    a.insertAdjacentElement('afterend', btn);
  });
}
fetch('/api/watched').then(r=>r.json()).then(codes=>{ WATCHED = new Set(codes); injectStars(); }).catch(()=>{});
new MutationObserver(()=>injectStars()).observe(document.body, {childList:true, subtree:true});
</script>
{% block script %}{% endblock %}
</body>
</html>
